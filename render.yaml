services:
  - type: web
    name: alumniconnect-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DEBUG
        value: "false"
      - key: PORT
        value: "10000"
      - key: SECRET_KEY
        generateValue: true
      - key: PUBLIC_BASE_URL
        value: https://alumniconnect-api.onrender.com
      - key: CORS_ORIGINS
        value: https://alumniconnect-web.onrender.com
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        sync: false
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DB
        sync: false
      - key: AUTO_INIT_DB
        value: "true"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USE_TLS
        value: "true"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: AlumniConnect Admin

  - type: web
    name: alumniconnect-web
    env: static
    plan: free
    rootDir: react-app
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://alumniconnect-api.onrender.com/api
      - key: VITE_UPLOAD_BASE_URL
        value: https://alumniconnect-api.onrender.com/uploads
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
